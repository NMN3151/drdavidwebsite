<section class="baot-section">

        <img src="../../../assets/images/whydrdavid.png" alt="Be The Best Part of Their Day Book" class="baot-book-image" />

      <div class="baot-content">
        <h2 class="baot-heading">Available for order today on Amazon, Audible, or from your local bookstore!</h2>
        <ul class="baot-list">

      <!-- Right: Amazon Badge -->
      <div class="baot-badge-wrapper">
